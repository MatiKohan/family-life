name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          # TODO: set push: true and add `registry` + login step to publish to a container registry
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # TODO: replace "template-repository" with your project name
          tags: template-repository-api:${{ github.sha }}

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          # TODO: set push: true and add `registry` + login step to publish to a container registry
          push: false
          build-args: |
            # TODO: replace with your actual API URL (e.g. https://api.yourdomain.com or your Railway URL)
            VITE_API_URL=https://placeholder.railway.app
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # TODO: replace "template-repository" with your project name
          tags: template-repository-web:${{ github.sha }}
